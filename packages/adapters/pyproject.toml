[project]
name = "neuromouse-adapters"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    "hypothesis>=6.0.0",
]

[project.optional-dependencies]
mea = [
    "h5py>=3.10.0",
    "spikeinterface>=0.101.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neuromouse_adapters"]
