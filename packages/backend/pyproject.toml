[project]
name = "neuromouse-backend"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0,<0.116.0",
    "psycopg[binary]>=3.2.2",
    "httpx>=0.28.0",
    "pydantic==2.11.0",
    "python-multipart>=0.0.9",
    "pytest-asyncio>=0.24.0",
    "schemathesis>=3.39.0",
    "uvicorn>=0.34.0",
    "neuromouse-contract",
    "neuromouse-core",
    "neuromouse-sandbox",
    "neuromouse-sdk",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neuromouse_backend"]
