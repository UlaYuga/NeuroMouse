[project]
name = "neuromouse-core"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    "neuromouse-contract",
    "neuromouse-sdk",
    "hypothesis>=6.0.0",
    "numpy>=1.26.0,<2.4",
    "scipy>=1.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neuromouse_core"]
