[project]
name = "neuromouse-sandbox"
version = "0.0.0"
description = "Process-isolation boundary for running untrusted NeuroMouse method/sorter code."
requires-python = ">=3.11"
dependencies = [
    "neuromouse-contract",
    "neuromouse-sdk",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neuromouse_sandbox"]

[tool.uv.sources]
neuromouse-contract = { workspace = true }
neuromouse-sdk = { workspace = true }
