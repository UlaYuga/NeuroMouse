name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  # GitHub forces action runtimes to Node 24 ~2026-06-16; opt in now so the
  # pinned v4/v5 actions keep running instead of breaking on the cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-gate:
    name: Linux Quality Gate (py${{ matrix.python-version }} / node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neuromouse
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=6
          --health-start-period=10s
        ports:
          # Job runs on the runner (not in a container), so reach the service
          # via localhost:<mapped-port>, not the service-network hostname.
          - 5432:5432
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        node-version: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Cache npm artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.node-version }}-${{ hashFiles('tests/property/package-lock.json', 'tests/fuzz/package-lock.json', 'packages/sdk-ts/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.node-version }}-

      - name: Sync Python dependencies
        run: uv sync

      - name: Install property fuzz dependencies
        run: |
          npm ci --prefix tests/property
          npm ci --prefix tests/fuzz
          npm ci --prefix packages/sdk-ts

      - name: Run pytest
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/neuromouse"
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check

      - name: Run Ty
        run: uv run ty check

      - name: Run Node tests
        run: node --test tests/*.test.mjs

      - name: Install Playwright
        run: |
          npm install --no-save --no-package-lock @playwright/test
          npx playwright install --with-deps chromium

      - name: Run login Playwright e2e
        env:
          NEUROMOUSE_BACKEND_DB: ${{ runner.temp }}/neuromouse-login-e2e.sqlite3
          NEUROMOUSE_E2E_BROWSER_CHANNEL: ""
          PYTHONPATH: contracts/src:packages/adapters/src:packages/backend/src:packages/core/src:packages/sandbox/src:packages/sdk/src:packages/sorting/src
        run: |
          uv run uvicorn neuromouse_backend.app:app --host 127.0.0.1 --port 8000 > "${RUNNER_TEMP}/neuromouse-backend.log" 2>&1 &
          BACKEND_PID=$!
          PORT=8080 HOST=127.0.0.1 NEUROMOUSE_BACKEND_URL=http://127.0.0.1:8000 node server.mjs > "${RUNNER_TEMP}/neuromouse-static.log" 2>&1 &
          STATIC_PID=$!

          cleanup() {
            kill "$STATIC_PID" "$BACKEND_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null && curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8000/healthz >/dev/null
          curl -fsS http://127.0.0.1:8080/healthz >/dev/null
          NEUROMOUSE_APP_URL=http://127.0.0.1:8080 NEUROMOUSE_BACKEND_URL=http://127.0.0.1:8000 npx playwright test js/e2e-auth-flow.test.mjs

      - name: "Run property fuzz: validate-data (bounded)"
        env:
          PROPERTY_BASE_CASES: "128"
          PROPERTY_DRY_RUNS: "4"
          PROPERTY_MAX_CASES: "1024"
        run: node --test tests/property/validate-data.property.test.mjs

      - name: "Run property fuzz: import-csv-zip (bounded)"
        env:
          PROPERTY_BASE_CASES: "128"
          PROPERTY_DRY_RUNS: "4"
          PROPERTY_MAX_CASES: "1024"
        run: node --test tests/property/import-csv-zip.property.test.mjs

      - name: Run deep fuzz suite (bounded)
        run: FUZZ_RUNS=20000 DSP_FUZZ_RUNS=5000 node tests/fuzz/live-payload.fuzz.mjs

      - name: TypeScript contract check
        working-directory: packages/sdk-ts
        run: NODE_OPTIONS=--max-old-space-size=4096 npx tsc --noEmit

      - name: Run sdk-ts tests
        run: npm --prefix packages/sdk-ts run test

      - name: Benchmarks (informational)
        continue-on-error: true
        run: |
          uv run python -m bench.perf_harness --help
